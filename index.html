<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Invitation 🎂</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff0f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      touch-action: manipulation;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      box-shadow: 0 4px 32px rgba(212, 83, 126, 0.12);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    h1 { font-size: 1.4rem; font-weight: 600; color: #2c2c2a; }
    p  { font-size: 1rem; color: #5f5e5a; }

    .emoji-big    { font-size: 3.5rem; }
    .emoji-med    { font-size: 2.5rem; }
    .confetti-row { font-size: 2rem; letter-spacing: 6px; animation: bounce 0.8s ease-in-out infinite alternate; }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    input[type=text] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1.5px solid #f0bbd0;
      outline: none;
      transition: border-color 0.2s;
      background: #fff8fb;
      color: #2c2c2a;
      -webkit-appearance: none;
    }
    input[type=text]:focus { border-color: #d4537e; }

    .btn-primary {
      background: #d4537e;
      color: #fff;
      border: none;
      padding: 13px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-link {
      background: none;
      border: none;
      color: #888780;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
      touch-action: manipulation;
    }

    /* Yes/No area — takes full width, fixed height for roaming space */
    .yesno-area {
      position: relative;
      width: 100%;
      height: 180px;
    }

    .btn-yes, .btn-no {
      width: 130px;
      padding: 13px 0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #ccc;
      position: absolute;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn-yes {
      background: #639922;
      color: #fff;
      border-color: #639922;
      left: 50%;
      transform: translateX(-73px); /* centers it slightly left */
      top: 60px;
      z-index: 2;
    }
    .btn-yes:hover { opacity: 0.9; }

    .btn-no {
      background: #fff;
      color: #2c2c2a;
      /* initial pos set by JS */
      z-index: 3;
      user-select: none;
      transition: none; /* instant teleport */
    }

    .hint {
      font-size: 0.78rem;
      color: #b85a7e;
      min-height: 18px;
      font-style: italic;
    }

    .floating { animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .guest-list {
      width: 100%;
      background: #fff8fb;
      border-radius: 12px;
      padding: 10px 14px;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #f0bbd0;
      -webkit-overflow-scrolling: touch;
    }

    .guest-item {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #f5d7e5;
      font-size: 0.92rem;
      color: #2c2c2a;
      gap: 8px;
    }
    .guest-item:last-child { border-bottom: none; }
    .guest-name { flex: 1; text-align: left; }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-yes { background: #eaf3de; color: #3b6d11; }
    .badge-no  { background: #fcebeb; color: #a32d2d; }

    .empty-state {
      font-size: 0.9rem;
      color: #b4b2a9;
      font-style: italic;
      padding: 1rem 0;
    }

    #sparkles {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      font-size: 1.4rem;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .pop-in { animation: pop 0.5s cubic-bezier(.36,1.7,.58,1) both; }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div id="app">

  <div class="screen active" id="screen-name">
    <div class="confetti-row">🎈🎂🎁</div>
    <h1>You're invited! 🥳</h1>
    <p>Enter your name to RSVP to the party</p>
    <input type="text" id="name-input" placeholder="Your name..." maxlength="40" />
    <button class="btn-primary" onclick="goToQuestion()">Continue →</button>
  </div>

  <div class="screen" id="screen-question">
    <div class="emoji-big floating">🎂</div>
    <h1>Hey <span id="q-name" style="color:#d4537e"></span>!</h1>
    <p style="font-size:1.1rem; color:#2c2c2a;">Will you come to my birthday? 🥳</p>
    <div class="yesno-area" id="yesno-area">
      <button class="btn-yes" onclick="sayYes()">Yes! 🎉</button>
      <button class="btn-no" id="btn-no" onclick="noCaught()">No 😢</button>
    </div>
    <div class="hint" id="no-hint"></div>
  </div>

  <div class="screen" id="screen-yes">
    <div class="emoji-big pop-in">🥳</div>
    <h1>Yay! <span id="yes-name" style="color:#d4537e"></span> is coming!</h1>
    <p>Can't wait to celebrate with you! 🎈🎂🎁</p>
    <div style="font-size:2rem; animation: bounce 0.8s infinite alternate">⭐✨🌟</div>
    <button class="btn-primary" onclick="goToList()">See the guest list 📋</button>
  </div>

  <div class="screen" id="screen-no">
    <div class="emoji-big">😭</div>
    <h1><span id="no-name" style="color:#d4537e"></span> said no...</h1>
    <p>We'll miss you! Maybe next time 💔</p>
    <button class="btn-primary" onclick="goToList()">See the guest list 📋</button>
  </div>

  <div class="screen" id="screen-list">
    <div class="emoji-med">📋</div>
    <h1>Guest list</h1>
    <div class="guest-list" id="guest-list-el"></div>
    <button class="btn-primary" onclick="restart()">Invite someone else</button>
    <button class="btn-link" onclick="clearList()">Clear list</button>
  </div>

</div>

<div id="sparkles"></div>

<script>
  const guests = JSON.parse(localStorage.getItem('bday_guests') || '[]');
  let currentName = '';
  let noMoves = 0;
  let lastRunTime = 0;

  const hints = [
    '',
    'Nice try! 😏',
    'It keeps running! 🏃',
    "You can't catch it! 😂",
    'Give up and say yes! 🥺',
    "It's way too fast for you 😎",
    'Just click YES already!! 🎂'
  ];

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goToQuestion() {
    const v = document.getElementById('name-input').value.trim();
    if (!v) { document.getElementById('name-input').focus(); return; }
    currentName = v;
    document.getElementById('q-name').textContent = v;
    noMoves = 0;
    document.getElementById('no-hint').textContent = '';
    resetNoBtn();
    show('screen-question');
  }

  function resetNoBtn() {
    const btn  = document.getElementById('btn-no');
    const area = document.getElementById('yesno-area');
    const aW   = area.offsetWidth;
    const centerX = aW / 2;
    btn.style.left = (centerX + 8) + 'px';
    btn.style.top  = '60px';
  }

  function runAwayFrom(fingerX, fingerY) {
    const now = Date.now();
    if (now - lastRunTime < 50) return;
    lastRunTime = now;

    const btn  = document.getElementById('btn-no');
    const area = document.getElementById('yesno-area');
    const aRect = area.getBoundingClientRect();
    const btnW  = btn.offsetWidth;
    const btnH  = btn.offsetHeight;
    const maxX  = area.offsetWidth  - btnW;
    const maxY  = area.offsetHeight - btnH;

    const relX = fingerX - aRect.left;
    const relY = fingerY - aRect.top;

    const curLeft = parseFloat(btn.style.left) || (area.offsetWidth / 2 + 8);
    const curTop  = parseFloat(btn.style.top)  || 60;
    const cx = curLeft + btnW / 2;
    const cy = curTop  + btnH / 2;

    let dx = cx - relX;
    let dy = cy - relY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    dx /= dist;
    dy /= dist;

    const jump = 130 + Math.random() * 50;
    let nx = curLeft + dx * jump + (Math.random() - 0.5) * 60;
    let ny = curTop  + dy * jump + (Math.random() - 0.5) * 60;

    nx = Math.max(0, Math.min(nx, maxX));
    ny = Math.max(0, Math.min(ny, maxY));

    btn.style.left = nx + 'px';
    btn.style.top  = ny + 'px';
    noMoves++;
    document.getElementById('no-hint').textContent = hints[Math.min(noMoves, hints.length - 1)];
  }

  function runAway(e) {
    runAwayFrom(e.clientX, e.clientY);
  }

  const noBtn = document.getElementById('btn-no');

  noBtn.addEventListener('mouseover', runAway);
  noBtn.addEventListener('mousemove', runAway);

  document.getElementById('yesno-area').addEventListener('touchmove', function(e) {
    e.preventDefault();
    const t = e.touches[0];
    const btn = document.getElementById('btn-no');
    const bRect = btn.getBoundingClientRect();
    const pad = 60; 
    if (
      t.clientX > bRect.left  - pad &&
      t.clientX < bRect.right + pad &&
      t.clientY > bRect.top   - pad &&
      t.clientY < bRect.bottom + pad
    ) {
      runAwayFrom(t.clientX, t.clientY);
    }
  }, { passive: false });

  document.getElementById('yesno-area').addEventListener('touchstart', function(e) {
    const t = e.touches[0];
    const btn = document.getElementById('btn-no');
    const bRect = btn.getBoundingClientRect();
    const pad = 60;
    if (
      t.clientX > bRect.left  - pad &&
      t.clientX < bRect.right + pad &&
      t.clientY > bRect.top   - pad &&
      t.clientY < bRect.bottom + pad
    ) {
      e.preventDefault();
      runAwayFrom(t.clientX, t.clientY);
    }
  }, { passive: false });

  function noCaught() {
    saveGuest(currentName, false);
    document.getElementById('no-name').textContent = currentName;
    show('screen-no');
  }

  function sayYes() {
    saveGuest(currentName, true);
    document.getElementById('yes-name').textContent = currentName;
    show('screen-yes');
    launchSparkles();
  }

  function saveGuest(name, coming) {
    guests.push({ name, coming, ts: Date.now() });
    localStorage.setItem('bday_guests', JSON.stringify(guests));
  }

  function goToList() {
    const el = document.getElementById('guest-list-el');
    if (!guests.length) {
      el.innerHTML = '<div class="empty-state">No guests yet!</div>';
    } else {
      el.innerHTML = guests.map(g =>
        `<div class="guest-item">
           <span class="guest-name">${esc(g.name)}</span>
           <span class="badge ${g.coming ? 'badge-yes' : 'badge-no'}">
             ${g.coming ? 'Coming 🎉' : "Can't come 😢"}
           </span>
         </div>`
      ).join('');
    }
    show('screen-list');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function restart() {
    document.getElementById('name-input').value = '';
    show('screen-name');
  }

  function clearList() {
    if (confirm('Clear the entire guest list?')) {
      guests.length = 0;
      localStorage.setItem('bday_guests', '[]');
      goToList();
    }
  }

  function launchSparkles() {
    const wrap = document.getElementById('sparkles');
    const emojis = ['🎉','✨','🎈','⭐','🌟','💖','🎊','🥳'];
    for (let i = 0; i < 22; i++) {
      setTimeout(() => {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.left = Math.random() * 95 + '%';
        const dur = 1.2 + Math.random() * 1.2;
        s.style.animationDuration = dur + 's';
        wrap.appendChild(s);
        setTimeout(() => s.remove(), dur * 1000 + 100);
      }, i * 70);
    }
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') goToQuestion();
  });

  window.addEventListener('resize', resetNoBtn);
</script>
</body>
</html>

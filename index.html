<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Birthday Invitation 🎂</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff0f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      touch-action: manipulation;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 32px rgba(212, 83, 126, 0.12);
      text-align: center;
    }
    .screen.active { display: flex; }

    #screen-question {
      position: relative;
      overflow: hidden;
      min-height: 400px;
      padding-bottom: 2.5rem;
    }

    h1 { font-size: 1.5rem; font-weight: 600; color: #2c2c2a; }
    p  { font-size: 1rem; color: #5f5e5a; }

    .emoji-big    { font-size: 3.5rem; }
    .emoji-med    { font-size: 2.5rem; }
    .confetti-row { font-size: 2rem; letter-spacing: 6px; animation: bounce 0.8s ease-in-out infinite alternate; }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    input[type=text] {
      width: 100%;
      padding: 11px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1.5px solid #f0bbd0;
      outline: none;
      transition: border-color 0.2s;
      background: #fff8fb;
      color: #2c2c2a;
      -webkit-appearance: none;
    }
    input[type=text]:focus { border-color: #d4537e; }

    .btn-primary {
      background: #d4537e;
      color: #fff;
      border: none;
      padding: 11px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-link {
      background: none;
      border: none;
      color: #888780;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .btn-yes {
      width: 130px;
      padding: 12px 0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #639922;
      background: #639922;
      color: #fff;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-yes:hover { opacity: 0.9; }

    /* No lives inside #screen-question with position:absolute */
    .btn-no {
      width: 130px;
      padding: 12px 0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #ccc;
      background: #fff;
      color: #2c2c2a;
      position: absolute;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .hint {
      font-size: 0.78rem;
      color: #b85a7e;
      min-height: 18px;
      font-style: italic;
      /* pinned so it doesn't shift layout */
      position: absolute;
      bottom: 1rem;
      left: 0; right: 0;
      text-align: center;
    }

    .floating { animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .guest-list {
      width: 100%;
      background: #fff8fb;
      border-radius: 12px;
      padding: 10px 14px;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #f0bbd0;
      -webkit-overflow-scrolling: touch;
    }

    .guest-item {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #f5d7e5;
      font-size: 0.92rem;
      color: #2c2c2a;
      gap: 8px;
    }
    .guest-item:last-child { border-bottom: none; }
    .guest-name { flex: 1; text-align: left; }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-yes { background: #eaf3de; color: #3b6d11; }

    .empty-state {
      font-size: 0.9rem;
      color: #b4b2a9;
      font-style: italic;
      padding: 1rem 0;
    }

    #sparkles {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      font-size: 1.4rem;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .pop-in { animation: pop 0.5s cubic-bezier(.36,1.7,.58,1) both; }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
<div id="app">

  <div class="screen active" id="screen-name">
    <div class="confetti-row">🎈🎂🎁</div>
    <h1>You're invited! 🥳</h1>
    <p>Enter your name to RSVP to the party</p>
    <input type="text" id="name-input" placeholder="Your name..." maxlength="40" />
    <button class="btn-primary" onclick="goToQuestion()">Continue →</button>
  </div>

  <div class="screen" id="screen-question">
    <div class="emoji-big floating">🎂</div>
    <h1>Hey <span id="q-name" style="color:#d4537e"></span>!</h1>
    <p style="font-size:1.1rem;color:#2c2c2a;">Will you come to my birthday? 🥳</p>
    <button class="btn-yes" onclick="sayYes()">Yes! 🎉</button>
    <button class="btn-no" id="btn-no">No 😢</button>
    <div class="hint" id="no-hint"></div>
  </div>

  <div class="screen" id="screen-yes">
    <div class="emoji-big pop-in">🥳</div>
    <h1>Yay! <span id="yes-name" style="color:#d4537e"></span> is coming!</h1>
    <p>Can't wait to celebrate with you! 🎈🎂🎁</p>
    <div style="font-size:2rem;animation:bounce 0.8s infinite alternate">⭐✨🌟</div>
    <button class="btn-primary" onclick="goToList()">See the guest list 📋</button>
  </div>

  <div class="screen" id="screen-list">
    <div class="emoji-med">📋</div>
    <h1>Guest list</h1>
    <div class="guest-list" id="guest-list-el"></div>
    <button class="btn-primary" onclick="restart()">Invite someone else</button>
    <button class="btn-link" onclick="clearList()">Clear list</button>
  </div>

</div>
<div id="sparkles"></div>

<script>
  const guests = JSON.parse((function(){ try { return localStorage.getItem('bday_guests')||'[]'; } catch(e){ return '[]'; } })());
  let currentName = '', noMoves = 0, lastRun = 0;
  const noBtn = document.getElementById('btn-no');
  const card  = document.getElementById('screen-question');

  const hints = [
    'Nice try! 😏',
    'It keeps running! 🏃',
    "You can't catch it! 😂",
    'Give up and say yes! 🥺',
    "It's way too fast for you 😎",
    'Just click YES already!! 🎂',
    'Still running... 🌀',
    'Are you even trying? 😂',
  ];

  function storageSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goToQuestion() {
    const v = document.getElementById('name-input').value.trim();
    if (!v) { document.getElementById('name-input').focus(); return; }
    currentName = v;
    document.getElementById('q-name').textContent = v;
    noMoves = 0;
    document.getElementById('no-hint').textContent = '';
    show('screen-question');
    requestAnimationFrame(placeNoInitial);
  }

  function placeNoInitial() {
    const cW   = card.offsetWidth;
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const yes  = document.querySelector('.btn-yes');
    const yR   = yes.getBoundingClientRect();
    const cR   = card.getBoundingClientRect();

    const top     = yR.top - cR.top;
    const gap     = 16;
    const totalW  = btnW * 2 + gap;
    const startX  = (cW - totalW) / 2;

    
    yes.style.position = 'absolute';
    yes.style.left = startX + 'px';
    yes.style.top  = top + 'px';

    noBtn.style.left = (startX + btnW + gap) + 'px';
    noBtn.style.top  = top + 'px';
  }

  function runAwayFrom(px, py) {
    const now = Date.now();
    if (now - lastRun < 40) return;
    lastRun = now;

    const cR   = card.getBoundingClientRect();
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;

    const curL = parseFloat(noBtn.style.left) || 0;
    const curT = parseFloat(noBtn.style.top)  || 0;
    const bcx  = curL + btnW / 2;
    const bcy  = curT + btnH / 2;

    const lx = px - cR.left;
    const ly = py - cR.top;

    let dx = bcx - lx, dy = bcy - ly;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    dx /= d; dy /= d;

    const jump = 120 + Math.random() * 80;
    let nx = curL + dx * jump + (Math.random() - 0.5) * 50;
    let ny = curT + dy * jump + (Math.random() - 0.5) * 50;

    const pad  = 8;
    const maxX = cR.width  - btnW - pad;
    const maxY = cR.height - btnH - pad - 32;

    if (nx < pad)  nx = pad  + Math.random() * (maxX * 0.4);
    if (nx > maxX) nx = maxX - Math.random() * (maxX * 0.4);
    if (ny < pad)  ny = pad  + Math.random() * (maxY * 0.4);
    if (ny > maxY) ny = maxY - Math.random() * (maxY * 0.4);

    noBtn.style.left = nx + 'px';
    noBtn.style.top  = ny + 'px';

    noMoves++;
    document.getElementById('no-hint').textContent = hints[noMoves % hints.length];
  }

  const PAD = 0; 

  function nearBtn(cx, cy) {
    const cR   = card.getBoundingClientRect();
    const curL = parseFloat(noBtn.style.left) || 0;
    const curT = parseFloat(noBtn.style.top)  || 0;
    /* btn rect in viewport coords */
    const bL = cR.left + curL;
    const bT = cR.top  + curT;
    const bR = bL + noBtn.offsetWidth;
    const bB = bT + noBtn.offsetHeight;
    return cx > bL - PAD && cx < bR + PAD && cy > bT - PAD && cy < bB + PAD;
  }

  card.addEventListener('mousemove', function(e) {
    if (nearBtn(e.clientX, e.clientY)) runAwayFrom(e.clientX, e.clientY);
  });

  card.addEventListener('touchmove', function(e) {
    const t = e.touches[0];
    if (nearBtn(t.clientX, t.clientY)) {
      e.preventDefault();
      runAwayFrom(t.clientX, t.clientY);
    }
  }, { passive: false });

  card.addEventListener('touchstart', function(e) {
    const t = e.touches[0];
    if (nearBtn(t.clientX, t.clientY)) {
      e.preventDefault();
      runAwayFrom(t.clientX, t.clientY);
    }
  }, { passive: false });

  noBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); });

  function sayYes() {
    saveGuest(currentName, true);
    document.getElementById('yes-name').textContent = currentName;
    show('screen-yes');
    launchSparkles();
  }

  function saveGuest(name, coming) {
    guests.push({ name, coming, ts: Date.now() });
    storageSet('bday_guests', JSON.stringify(guests));
  }

  function goToList() {
    const el = document.getElementById('guest-list-el');
    el.innerHTML = guests.length
      ? guests.map(g => `<div class="guest-item"><span class="guest-name">${esc(g.name)}</span><span class="badge badge-yes">Coming 🎉</span></div>`).join('')
      : '<div class="empty-state">No guests yet!</div>';
    show('screen-list');
  }

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function restart() {
    document.getElementById('name-input').value = '';
    show('screen-name');
  }

  function clearList() {
    if (confirm('Clear the entire guest list?')) {
      guests.length = 0;
      storageSet('bday_guests', '[]');
      goToList();
    }
  }

  function launchSparkles() {
    const wrap = document.getElementById('sparkles');
    const emojis = ['🎉','✨','🎈','⭐','🌟','💖','🎊','🥳'];
    for (let i = 0; i < 22; i++) {
      setTimeout(() => {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.left = Math.random() * 95 + '%';
        const dur = 1.2 + Math.random() * 1.2;
        s.style.animationDuration = dur + 's';
        wrap.appendChild(s);
        setTimeout(() => s.remove(), dur * 1000 + 100);
      }, i * 70);
    }
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') goToQuestion();
  });
</script>
</body>
</html>
